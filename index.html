<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PowerLink Ghana 2050 Command Center</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">⚡</div>
        <div>
          <h1>PowerLink Ghana</h1>
          <p>Command Center</p>
        </div>
      </div>

      <nav class="nav" id="nav"></nav>

      <div class="system-card">
        <div class="system-icon">●</div>
        <div>
          <strong>System Status</strong>
          <span>All systems operational</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <section class="page-header">
        <div>
          <h2 id="pageTitle">Home Dashboard</h2>
          <p id="pageSubtitle">Phase 1 KPI overview for the Tamale–Savelugu Opportunity Corridor</p>
        </div>

        <div id="pageStatus" class="status-pill">Phase 1 Active</div>
      </section>

      <section id="pageContent"></section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
